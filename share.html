<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Wenliang Chen</title>
    <meta property="og:title" content="Wenliang Chen — Automotive Designer × Investor">
    <meta property="og:description" content="汽车设计师 · 个人投资者">
    <meta property="og:image" content="https://s.coze.cn/image/kggvlk1dtg8/">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@100;300;400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #080808;
            --card: #111;
            --border: #1e1e1e;
            --text: #e4e4e4;
            --dim: #888;
            --accent: #b8944f;
            --accent-glow: rgba(184,148,79,0.12);
        }
        html, body {
            height: 100%;
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(184,148,79,0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(184,148,79,0.03) 0%, transparent 60%);
        }

        .card {
            width: 100%;
            max-width: 380px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(20px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Header with photo */
        .card-header {
            position: relative;
            padding: 40px 32px 24px;
            text-align: center;
            background: linear-gradient(180deg, rgba(184,148,79,0.06) 0%, transparent 100%);
        }
        .avatar-ring {
            width: 100px; height: 100px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            padding: 3px;
            margin: 0 auto 20px;
            box-shadow: 0 0 30px var(--accent-glow);
        }
        .avatar-ring img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            filter: grayscale(20%);
        }
        .card-name {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 400;
            color: #fff;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .card-tagline {
            font-size: 13px;
            color: var(--dim);
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        /* Divider */
        .divider {
            height: 1px;
            margin: 0 32px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
        }

        /* Info section */
        .card-body {
            padding: 24px 32px;
        }
        .info-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 0;
        }
        .info-row + .info-row {
            border-top: 1px solid rgba(255,255,255,0.04);
        }
        .info-icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: var(--accent-glow);
            border: 1px solid rgba(184,148,79,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
        }
        .info-text {
            display: flex;
            flex-direction: column;
        }
        .info-label {
            font-size: 10px;
            color: var(--dim);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .info-value {
            font-size: 14px;
            color: var(--text);
            font-weight: 300;
        }

        /* CTA Button */
        .card-footer {
            padding: 0 32px 32px;
        }
        .cta-btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid var(--accent);
            border-radius: 12px;
            color: var(--accent);
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 2px;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        .cta-btn:hover, .cta-btn:active {
            background: var(--accent);
            color: var(--bg);
        }

        /* Bottom tag */
        .card-tag {
            text-align: center;
            padding: 0 32px 24px;
            font-size: 10px;
            color: rgba(255,255,255,0.15);
            letter-spacing: 2px;
        }

        /* Small screen adjustments */
        @media (max-height: 680px) {
            .card-header { padding: 28px 24px 18px; }
            .avatar-ring { width: 80px; height: 80px; margin-bottom: 14px; }
            .card-name { font-size: 22px; }
            .card-body { padding: 18px 24px; }
            .card-footer { padding: 0 24px 24px; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <div class="avatar-ring">
            <img src="og-image.jpg" alt="Wenliang Chen">
        </div>
        <div class="card-name">Wenliang Chen</div>
        <div class="card-tagline">Automotive Designer × Investor</div>
    </div>

    <div class="divider"></div>

    <div class="card-body">
        <div class="info-row">
            <div class="info-icon">◆</div>
            <div class="info-text">
                <div class="info-label">School</div>
                <div class="info-value">广州美术学院 · 汽车设计</div>
            </div>
        </div>
        <div class="info-row">
            <div class="info-icon">✦</div>
            <div class="info-text">
                <div class="info-label">Focus</div>
                <div class="info-value">汽车设计 · AI工作流 · 价值投资</div>
            </div>
        </div>
        <div class="info-row">
            <div class="info-icon">◈</div>
            <div class="info-text">
                <div class="info-label">Investment</div>
                <div class="info-value">稀有金属 · AI基础设施 · 能源</div>
            </div>
        </div>
    </div>

    <div class="card-footer">
        <a class="cta-btn" href="index.html">查看完整作品集 →</a>
    </div>

    <div class="card-tag">DESIGN THE FUTURE, INVEST IN IT.</div>
</div>

</body>
</html>
