<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Open Graph / Social Share -->
    <meta property="og:type" content="profile">
    <meta property="og:title" content="Wenliang Chen — Automotive Designer × Investor">
    <meta property="og:description" content="汽车设计师 · 个人投资者。广州美术学院汽车设计专业，用AI重塑设计工作流，同时以产业视角布局投资赛道。">
    <meta property="og:image" content="https://s.coze.cn/image/kggvlk1dtg8/">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Wenliang Chen — Automotive Designer × Investor">
    <meta name="twitter:description" content="汽车设计师 · 个人投资者。广州美术学院汽车设计专业，用AI重塑设计工作流，同时以产业视角布局投资赛道。">
    <meta name="twitter:image" content="https://s.coze.cn/image/kggvlk1dtg8/">
    <meta name="description" content="Wenliang Chen — Automotive Designer & Investor Portfolio">
    <title>Wenliang Chen — Design × Investment</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="cursor-dot" id="cursor"></div>

<!-- NAV -->
<nav>
    <div class="logo">Wenliang Chen</div>
    <div class="nav-right">
        <ul>
            <li><a href="#about" data-i18n="nav_about">关于</a></li>
            <li><a href="#works" data-i18n="nav_works">作品</a></li>
            <li><a href="#fitness" data-i18n="nav_fitness">健身</a></li>
            <li><a href="#contact" data-i18n="nav_contact">联系</a></li>
        </ul>
        <div class="lang-wrap">
            <button class="lang-btn" id="langBtn">中文</button>
            <div class="lang-dropdown" id="langDropdown">
                <div data-lang="zh" class="active">中文</div>
                <div data-lang="en">English</div>
                <div data-lang="ja">日本語</div>
                <div data-lang="ko">한국어</div>
                <div data-lang="ar">العربية</div>
                <div data-lang="de">Deutsch</div>
                <div data-lang="fr">Français</div>
            </div>
        </div>
        <button class="hamburger" id="hamburger">
            <span></span><span></span><span></span>
        </button>
    </div>
</nav>

<!-- MOBILE NAV -->
<div class="mobile-nav" id="mobileNav">
    <a href="#about" data-i18n="nav_about">关于</a>
    <a href="#works" data-i18n="nav_works">作品</a>
    <a href="#fitness" data-i18n="nav_fitness">健身</a>
    <a href="#contact" data-i18n="nav_contact">联系</a>
    <div class="mobile-lang-wrap">
        <select id="mobileLangSelect">
            <option value="zh">中文</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="ar">العربية</option>
            <option value="de">Deutsch</option>
            <option value="fr">Français</option>
        </select>
    </div>
</div>

<!-- SNAP SCROLL CONTAINER -->
<!-- SIDE DOT NAV -->
<nav class="dot-nav" id="dotNav">
    <div class="dot-item active" data-target="hero"><span class="dot-label">Home</span></div>
    <div class="dot-item" data-target="about"><span class="dot-label">About</span></div>
    <div class="dot-item" data-target="works"><span class="dot-label">Works</span></div>
    <div class="dot-item" data-target="projects"><span class="dot-label">Projects</span></div>
    <div class="dot-item" data-target="fitness"><span class="dot-label">Fitness</span></div>
    <div class="dot-item" data-target="contact"><span class="dot-label">Contact</span></div>
</nav>

<div class="snap-container" id="snapContainer">

<!-- HERO -->
<section class="hero snap-section in-view">
    <div class="section-inner">
    <div class="hero-bg-text">DESIGN</div>
    <div class="hero-content">
        <div class="hero-left">
            <h1 id="heroTitle"></h1>
            <p class="tagline" id="heroTagline"></p>
        </div>
        <div class="hero-right">
            <div id="heroPhotoWrap"></div>
            <div class="hero-meta" id="heroMeta"></div>
        </div>
    </div>
    <div class="hero-scroll">
        <div class="line"></div>
        <span data-i18n="hero_scroll">下滑</span>
    </div>
    </div><!-- end section-inner -->
</section>

<!-- ABOUT -->
<section class="section snap-section" id="about">
    <div class="section-inner">
    <div class="section-label">01</div>
    <div class="section-header reveal">
        <span class="num">01</span>
        <h2 data-i18n="about_title">关于<em>我</em></h2>
    </div>
    <div class="about-grid">
        <div class="about-text reveal" id="aboutText"></div>
        <div class="about-sidebar reveal" id="aboutSidebar"></div>
    </div>
    </div><!-- end section-inner -->
</section>

<!-- WORKS -->
<section class="section snap-section" id="works">
    <div class="section-inner">
    <div class="section-label">02</div>
    <div class="section-header reveal">
        <span class="num">02</span>
        <h2 data-i18n="works_title">作品<em>集</em></h2>
    </div>
    <div id="worksContainer"></div>
    </div><!-- end section-inner -->
</section>

<!-- PROJECTS -->
<section class="section snap-section" id="projects">
    <div class="section-inner">
    <div class="section-label">03</div>
    <div class="section-header reveal">
        <span class="num">03</span>
        <h2 data-i18n="proj_title">项目<em>经历</em></h2>
    </div>
    <div class="projects-timeline reveal" id="projectsContainer"></div>
    </div><!-- end section-inner -->
</section>

<!-- FITNESS -->
<section class="section snap-section" id="fitness">
    <div class="section-inner">
    <div class="section-label">04</div>
    <div class="section-header reveal">
        <span class="num">04</span>
        <h2 data-i18n="fitness_title">健身<em>生活</em></h2>
    </div>
    <div class="invest-layout reveal">
        <div class="invest-narrative" id="investNarrative"></div>
        <div class="invest-tracks" id="investTracks"></div>
    </div>
    </div><!-- end section-inner -->
</section>

<!-- CONTACT -->
<section class="contact-section snap-section" id="contact">
    <div class="section-inner">
    <div class="contact-left">
        <div class="big-text" id="contactBig"></div>
    </div>
    <div class="contact-right">
        <div class="contact-links" id="contactLinks"></div>
    </div>
    <footer>
    <span id="footerCopy"></span>
    <span id="footerTag"></span>
    </footer>
    </div><!-- end section-inner -->
</section>

</div><!-- end snap-container -->

<!-- GALLERY VIEWER -->
<div class="gallery-viewer" id="galleryViewer">
    <div class="gallery-viewer-header">
        <div class="gallery-viewer-title" id="galleryTitle"></div>
        <div class="gallery-viewer-counter" id="galleryCounter"></div>
    </div>
    <div class="gallery-close" id="galleryClose" title="关闭 (ESC)">✕</div>
    <div class="gallery-scroll" id="galleryScroll"></div>
    <div class="gallery-progress">
        <div class="gallery-progress-bar" id="galleryProgress"></div>
    </div>
    <div class="gallery-nav-hint" id="galleryHint">滚动浏览</div>
</div>

<!-- 数据文件 -->
<script src="data.js"></script>
<script src="gallery_data.js"></script>
<script src="js/app.js"></script>

</body>
</html>
